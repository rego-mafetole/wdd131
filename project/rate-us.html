<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rate Us</title>
    <meta name="description"
        content="WDD 131 - Dynamic Web Fundamentals - Regomoditswe Elizabeth Mafetole. Mzansi Street Food project.">
    <meta name="author" content="Regomoditswe Elizabeth Mafetole">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="rate.css">
</head>
<body">

    <header>
        <div class="header-container">
            <img src="mzanzi-logo.jpeg" alt="" width="75" height="75">
            <span class="site-name">
            <h1 class="header-title">Service Review System</h1>
        </div>
    </header>

    <main class="container">

        <div class="form-card">
            <h2>📝Service Review</h2>
            <p class="subtitle">Share your experience with our website</p>
            
            <form id="reviewForm" method="get" action="review.html" onsubmit="return validateForm(event)">

                <b>Overall Rating</b>

                <div class="rating-simple">
                    <div class="rating-item">
                        <input type="radio" name="rating" id="rating1" value="1" required>
                        <label for="rating1">&star;</label>
                        </div>

                        <div class="rating-item">
                            <input type="radio" name="rating" id="rating2" value="2" required>
                            <label for="rating2">&star;&star;</label>
                        </div>

                        <div class="rating-item">
                            <input type="radio" name="rating" id="rating3" value="3" required>
                            <label for="rating3">&star;&star;&star;</label>
                        </div>

                        <div class="rating-item">
                            <input type="radio" name="rating" id="rating4" value="4" required>
                            <label for="rating4">&star;&star;&star;&star;</label>
                        </div>

                        <div class="rating-item">
                            <input type="radio" name="rating" id="rating5" value="5" required>
                            <label for="rating5">&star;&star;&star;&star;&star;</label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="review">Written Review <span class="required">(optional)</span></label>
                        <textarea name="review" id="review" rows="4"></textarea>
                    </div>

                    <div class="form-group">
                    <label for="username">Your Name <span class="required">(optional)</span>
                        <input type="text" id="username" name="name" autocomplete="name">
                    </label>
                    </div>

                    <input type="submit" value="Post Review" class="submit-btn">
                </form>
            </div>
    </main>

    <footer>
        <p>&copy; <span id="currentyear"></span> 🌸 Regomoditswe Mafetole 🌸 South Africa </p>
        <p id="lastModified"></p>
    </footer>
    <script src="project.js" defer></script>
    </body>

</html>
