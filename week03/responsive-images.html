<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Images</title>
    <link rel="stylesheet" href="responsive-images.css">
</head>
<body>
    <main>
        <div class="hero">
            <picture>
                <source srcset=w03-images/hero-large.webp" media="(min-width: 1000px)">
                <source srcset="w03-images/hero-medium.webp" media="(min-width: 500px)">
                <img src="w03-images/hero-small.webp" alt="Temple name and location" width="500" height="250">
            </picture>
        </div>
    </main>
</body>
</html>
