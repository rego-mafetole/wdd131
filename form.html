<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review</title>
    <meta name="description"
        content="WDD 131 - Dynamic Web Fundamentals - Regomoditswe Elizabeth Mafetole form project.">
    <meta name="author" content="Regomoditswe Elizabeth Mafetole">
    <link rel="stylesheet" href="styles/form.css">
    <link rel="stylesheet" href="styles/form-large.css">
    <script src="scripts/form.js" defer></script>
</head>
<body>

    <main>
        <div class="product-review">
            <header>
                <h1>Product Review</h1>
            </header>
                <form id="reviewForm" method="get" action="review.html">

                    <label for="product-name">Product Name: </label>
                    <select name="productName" id="product-name" required>
                        <option value="" disabled selected>Select a Product...</option>
                        <option value="fc-1888">Flux Capacitor</option>
                        <option value="fc-2050">Power Laces</option>
                        <option value="fs-1987">Time Circuits</option>
                        <option value="ac-2000">Low Voltage Reactor</option>
                        <option value="jj-1969">Warp Equalizer</option>

                    </select>

                        <label> Overall Rating </label>

                        <div class="ratings container">
                            <div class="ratings">
                                <label for="rating1">&star;</label>
                                <input type="radio" name="rating" id="rating1" value="1" required>
                            </div>

                            <div class="ratings">
                                <label for="rating2">&star;&star;</label>
                                <input type="radio" name="rating" id="rating2" value="2" required>
                            </div>

                            <div class="ratings">
                                <label for="rating3">&star;&star;&star;</label>
                                <input type="radio" name="rating" id="rating3" value="3" required>
                            </div>
                            
                            <div class="ratings">
                                <label for="rating4">&star;&star;&star;&star;</label>
                                <input type="radio" name="rating" id="rating4" value="4" required>
                            </div>

                            <div class="ratings">
                                <label for="rating5">&star;&star;&star;&star;&star;</label>
                                <input type="radio" name="rating" id="rating5" value="5" required>
                            </div>
                        </div>
                    
                    <div>
                        <label for="install-date">Date of Installation: 
                            <input type="date" id="install-date" name="installDate" required>
                        </label>
                    </div>

                    <fieldset>
                        <legend>Which features did you find useful? (Check all that apply)</legend>
                        <div class="check-box">
                            <input type="checkbox" id="feature1" name="feature" value="durability">
                            <label for="feature1">Durability</label>
                        </div>
                            

                        <div class="check-box">
                            <input type="checkbox" id="feature2" name="feature" value="ease">
                            <label for="feature2">Ease of Use</label>
                        </div>

                        <div class="check-box">
                            <input type="checkbox" id="feature3" name="feature" value="performance">
                            <label for="feature3">Performance</label>
                        </div>

                        <div class="check-box">
                            <input type="checkbox" id="feature4" name="feature" value="design">
                            <label for="feature4">Design</label>
                        </div>
                    </fieldset>

                    <label for="review">Written Review <span class="required">(optional)</span></label>
                    <textarea name="review" id="review" rows="4"></textarea>

                    <label for="username">Your Name <span class="required">(optional)</span></label>
                    <input type="text" id="username" name="username">

                    <input type="submit" value="Post Review" class="submit-btn">
                </form>
            
        </div>
    </main>

    <footer>
        <p>&copy; <span id="currentyear"></span> 🌸 Regomoditswe Mafetole 🌸 South Africa </p>
        <p id="lastModified"></p>
    </footer>
</body>
</html>
